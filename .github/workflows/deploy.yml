name: Production Validation

on:
  push:
    branches:
      - main

jobs:
  production-validation:
    name: Validate Production Code
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask
          cd app
          pip install -r requirements.txt
      
      - name: Run production tests
        id: production-tests
        run: |
          cd app
          pytest tests/ -v --tb=short
      
      - name: Send Telegram notification - Merge to Main Success
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/ci_cd/send_telegram.py \
            --event merge_test \
            --repo ${{ github.repository }} \
            --message "Código mergeado exitosamente a rama main (producción)"
      
      - name: Send Telegram notification - Production Tests Failed
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/ci_cd/send_telegram.py \
            --event test_result \
            --repo ${{ github.repository }} \
            --status failure \
            --message "Las pruebas de producción han fallado"
