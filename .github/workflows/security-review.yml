      #     echo "✅ El código pasó el análisis de seguridad"
      #     echo "✅ El PR puede ser mergeado a test para continuar con el proceso de CI/CD"

  merge-to-test:
    name: Merge to Test Branch
    runs-on: ubuntu-latest
    needs: security-review
    if: success()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}
      
      - name: Merge to test
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout test
          # Usar el SHA del commit actual si es un push, o el SHA del PR si es un PR
          if [ "${{ github.event_name }}" == "push" ]; then
            git merge ${{ github.sha }} --ff-only
          else
            git merge ${{ github.event.pull_request.head.sha }} --ff-only
          fi
          git push origin test
      
