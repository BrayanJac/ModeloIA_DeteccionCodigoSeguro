name: Security Review with AI

on:
  push:
    branches:
      - dev

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  security-review:
    name: Analyze Code with ML Model
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}/scripts:${{ github.workspace }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scikit-learn joblib numpy requests

      - name: Check if model exists
        run: |
          if [ ! -f "models/security_classifier.joblib" ]; then
            echo "ERROR: Modelo no encontrado en models/security_classifier.joblib"
            exit 1
          fi
          if [ ! -f "models/vectorizer.joblib" ]; then
            echo "ERROR: Vectorizador no encontrado en models/vectorizer.joblib"
            exit 1
          fi
          if [ ! -f "models/feature_names.joblib" ]; then
            echo "ERROR: Nombres de características no encontrados en models/feature_names.joblib"
            exit 1
          fi
          echo "✅ Modelo y archivos auxiliares encontrados"

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            app/**/*.py
            app/**/*.js
            app/**/*.java
            app/**/*.cpp
            app/**/*.c
            app/**/*.php
            app/**/*.rb
            app/**/*.go
            app/**/*.ts

      - name: Send Telegram notification - Analysis Start
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/ci_cd/send_telegram.py \
            --event analysis_start \
            --repo ${{ github.repository }}

      - name: Analyze changed files with ML
        id: analysis
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/ci_cd/analyze_pr.py \
            --files "${{ steps.changed-files.outputs.all_changed_files }}" \
            --repo-owner "${{ github.repository_owner }}" \
            --repo-name "${{ github.event.repository.name }}" \
            --threshold 0.75

      - name: Comment on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let commentBody = '';

            try {
              commentBody = fs.readFileSync('reports/pr_comment.md', 'utf8');
            } catch (e) {
              commentBody = '## 🔒 Análisis de Seguridad\n\nNo se pudo generar el reporte de análisis.';
            }

            console.log(commentBody);

      - name: Send Telegram notification - Analysis Result Safe
        if: steps.analysis.outcome == 'success'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          ANALYSIS_DETAILS="$(python scripts/ci_cd/summarize_analysis.py reports/analysis_result.json)"
          python scripts/ci_cd/send_telegram.py \
            --event analysis_result \
            --repo ${{ github.repository }} \
            --status success \
            --details "$ANALYSIS_DETAILS"

      - name: Handle vulnerable code
        if: steps.analysis.outcome == 'failure'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "❌ Se detectó código vulnerable"
          ANALYSIS_DETAILS="$(python scripts/ci_cd/summarize_analysis.py reports/analysis_result.json)"

          # Enviar notificación Telegram
          python scripts/ci_cd/send_telegram.py \
            --event vulnerability_rejected \
            --repo ${{ github.repository }} \
            --details "$ANALYSIS_DETAILS"

          exit 1

  merge-to-test:
    name: Merge to Test Branch
    runs-on: ubuntu-latest
    needs: security-review
    if: success() && github.event_name == 'push' && github.ref_name == 'dev'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Validate promotion source
        run: |
          if [ "${{ github.event_name }}" != "push" ]; then
            echo "Este workflow solo puede promover pushes validados desde dev hacia test."
            exit 1
          fi

          if [ "${{ github.ref_name }}" != "dev" ]; then
            echo "Solo se permite promover cambios desde dev hacia test."
            exit 1
          fi

      - name: Create PR to test
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          # Verificar si ya existe un PR de dev a test
          EXISTING_PR=$(gh pr list --base test --head dev --json number --jq '.[0].number' || echo "")

          if [ -n "$EXISTING_PR" ]; then
            echo "Ya existe un PR de dev a test (#$EXISTING_PR). Actualizando..."
            gh pr edit "$EXISTING_PR" --title "Automated promotion from dev to test" --body "Este PR fue creado automáticamente por el workflow de seguridad después de pasar el análisis de código."
          else
            echo "Creando nuevo PR de dev a test..."
            gh pr create \
              --base test \
              --head dev \
              --title "Automated promotion from dev to test" \
              --body "Este PR fue creado automáticamente por el workflow de seguridad después de pasar el análisis de código."

            # Obtener el número del PR recién creado
            PR_NUMBER=$(gh pr list --base test --head dev --json number --jq '.[0].number')

            # Aprobar el PR automáticamente
            gh pr review "$PR_NUMBER" --approve --body "Aprobado automáticamente por el workflow de seguridad."

            # Hacer merge del PR automáticamente
            gh pr merge "$PR_NUMBER" --merge --delete-branch=false
          fi

      - name: Send Telegram notification - Merge to Test
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/ci_cd/send_telegram.py \
            --event merge_test \
            --repo ${{ github.repository }}
