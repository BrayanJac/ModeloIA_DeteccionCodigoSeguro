name: Security Review with AI

on:
  pull_request:
    branches:
      - test
    types: [opened, synchronize, reopened]

jobs:
  security-review:
    name: Analyze Code with ML Model
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scikit-learn joblib numpy requests
      
      - name: Check if model exists
        run: |
          if [ ! -f "models/security_classifier.joblib" ]; then
            echo "ERROR: Modelo no encontrado en models/security_classifier.joblib"
            exit 1
          fi
          if [ ! -f "models/vectorizer.joblib" ]; then
            echo "ERROR: Vectorizador no encontrado en models/vectorizer.joblib"
            exit 1
          fi
          if [ ! -f "models/feature_names.joblib" ]; then
            echo "ERROR: Nombres de características no encontrados en models/feature_names.joblib"
            exit 1
          fi
          echo "✅ Modelo y archivos auxiliares encontrados"
      
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            **/*.py
            **/*.js
            **/*.java
            **/*.cpp
            **/*.c
            **/*.php
            **/*.rb
            **/*.go
            **/*.ts
      
      - name: Send Telegram notification - Analysis Start
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/ci_cd/send_telegram.py \
            --event analysis_start \
            --pr-number ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --message "Iniciando análisis de seguridad del PR #${{ github.event.pull_request.number }}"
      
      - name: Analyze changed files with ML
        id: analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/ci_cd/analyze_pr.py \
            --files "${{ steps.changed-files.outputs.all_changed_files }}" \
            --pr-number ${{ github.event.pull_request.number }} \
            --repo-owner ${{ github.repository_owner }} \
            --repo-name ${{ github.event.repository.name }} \
            --threshold 0.75
      
      - name: Comment on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let commentBody = '';
            
            try {
              commentBody = fs.readFileSync('reports/pr_comment.md', 'utf8');
            } catch (e) {
              commentBody = '## 🔒 Análisis de Seguridad\n\nNo se pudo generar el reporte de análisis.';
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            });
      
      - name: Handle vulnerable code
        if: steps.analysis.outcome == 'failure'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "❌ Se detectó código vulnerable"
          
          # Enviar notificación Telegram
          python scripts/ci_cd/send_telegram.py \
            --event vulnerability_rejected \
            --pr-number ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --message "PR rechazado por vulnerabilidad detectada"
          
          # Agregar etiqueta fixing-required
          python scripts/ci_cd/comment_pr.py \
            --repo-owner ${{ github.repository_owner }} \
            --repo-name ${{ github.event.repository.name }} \
            --pr-number ${{ github.event.pull_request.number }} \
            --label fixing-required
          
          # Crear issue automática
          python scripts/ci_cd/create_issue.py \
            --repo-owner ${{ github.repository_owner }} \
            --repo-name ${{ github.event.repository.name }} \
            --pr-number ${{ github.event.pull_request.number }} \
            --files "${{ steps.changed-files.outputs.all_changed_files }}"
          
          exit 1
      
      - name: Send Telegram notification - Analysis Result (Safe)
        if: steps.analysis.outcome == 'success'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/ci_cd/send_telegram.py \
            --event analysis_result \
            --pr-number ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --status success \
            --message "Análisis de seguridad completado exitosamente - Código seguro"
      
      - name: Success message
        if: steps.analysis.outcome == 'success'
        run: |
          echo "✅ No se detectó código vulnerable"
          echo "✅ El código pasó el análisis de seguridad"
          echo "✅ El PR puede ser mergeado a test"
