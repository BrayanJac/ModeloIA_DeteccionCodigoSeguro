name: Security Review with AI

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - test
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  security-review:
    name: Analyze Code with ML Model
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scikit-learn joblib numpy requests

      - name: Check if model exists
        run: |
          if [ ! -f "models/security_classifier.joblib" ]; then
            echo "ERROR: Modelo no encontrado en models/security_classifier.joblib"
            exit 1
          fi
          if [ ! -f "models/vectorizer.joblib" ]; then
            echo "ERROR: Vectorizador no encontrado en models/vectorizer.joblib"
            exit 1
          fi
          if [ ! -f "models/feature_names.joblib" ]; then
            echo "ERROR: Nombres de características no encontrados en models/feature_names.joblib"
            exit 1
          fi
          echo "✅ Modelo y archivos auxiliares encontrados"

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            app/**/*.py
            app/**/*.js
            app/**/*.java
            app/**/*.cpp
            app/**/*.c
            app/**/*.php
            app/**/*.rb
            app/**/*.go
            app/**/*.ts

      - name: Send Telegram notification - Analysis Start
        if: github.event_name == 'pull_request'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/ci_cd/send_telegram.py \
            --event analysis_start \
            --pr-number ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }}

      - name: Analyze changed files with ML
        id: analysis
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/ci_cd/analyze_pr.py \
            --files "${{ steps.changed-files.outputs.all_changed_files }}" \
            --repo-owner "${{ github.repository_owner }}" \
            --repo-name "${{ github.event.repository.name }}" \
            --threshold 0.75 \
            --pr-number "${{ github.event.pull_request.number }}"

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let commentBody = '';

            try {
              commentBody = fs.readFileSync('reports/pr_comment.md', 'utf8');
            } catch (e) {
              commentBody = '## 🔒 Análisis de Seguridad\n\nNo se pudo generar el reporte de análisis.';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            });

      - name: Send Telegram notification - Analysis Result Safe
        if: steps.analysis.outcome == 'success'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          ANALYSIS_DETAILS="$(python scripts/ci_cd/summarize_analysis.py reports/analysis_result.json)"
          python scripts/ci_cd/send_telegram.py \
            --event analysis_result \
            --pr-number ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --status success \
            --details "$ANALYSIS_DETAILS"

      - name: Handle vulnerable code
        if: github.event_name == 'pull_request' && steps.analysis.outcome == 'failure'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "❌ Se detectó código vulnerable"
          ANALYSIS_DETAILS="$(python scripts/ci_cd/summarize_analysis.py reports/analysis_result.json)"

          # Enviar notificación Telegram
          python scripts/ci_cd/send_telegram.py \
            --event vulnerability_rejected \
            --pr-number ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --details "$ANALYSIS_DETAILS"

          # Agregar etiqueta fixing-required
          python scripts/ci_cd/comment_pr.py \
            --repo-owner ${{ github.repository_owner }} \
            --repo-name ${{ github.event.repository.name }} \
            --pr-number ${{ github.event.pull_request.number }} \
            --label fixing-required

          # Crear issue automática
          python scripts/ci_cd/create_issue.py \
            --repo-owner ${{ github.repository_owner }} \
            --repo-name ${{ github.event.repository.name }} \
            --pr-number ${{ github.event.pull_request.number }} \
            --files "${{ steps.changed-files.outputs.all_changed_files }}"

          exit 1

  merge-to-test:
    name: Merge to Test Branch
    runs-on: ubuntu-latest
    needs: security-review
    if: success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Validate promotion source
        run: |
          if [ "${{ github.event.pull_request.base.ref }}" != "test" ]; then
            echo "Este workflow solo puede promover PRs hacia test."
            exit 1
          fi

          if [ "${{ github.event.pull_request.head.ref }}" != "dev" ]; then
            echo "Solo se permite promover cambios desde dev hacia test."
            exit 1
          fi

          if [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            echo "No se permiten merges automáticos desde forks."
            exit 1
          fi

      - name: Merge to test
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin test
          git checkout test
          git merge ${{ github.event.pull_request.head.sha }} --no-ff
          git push origin test

      - name: Send Telegram notification - Merge to Test
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/ci_cd/send_telegram.py \
            --event merge_test \
            --pr-number ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }}
