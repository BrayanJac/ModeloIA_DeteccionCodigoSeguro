name: Security Review with AI

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - test
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  security-review:
    name: Analyze Code with ML Model
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scikit-learn joblib numpy requests
      
      - name: Check if model exists
        run: |
          if [ ! -f "models/security_classifier.joblib" ]; then
            echo "ERROR: Modelo no encontrado en models/security_classifier.joblib"
            exit 1
          fi
          if [ ! -f "models/vectorizer.joblib" ]; then
            echo "ERROR: Vectorizador no encontrado en models/vectorizer.joblib"
            exit 1
          fi
          if [ ! -f "models/feature_names.joblib" ]; then
            echo "ERROR: Nombres de características no encontrados en models/feature_names.joblib"
            exit 1
          fi
          echo "✅ Modelo y archivos auxiliares encontrados"
      
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            app/**/*.py
            app/**/*.js
            app/**/*.java
            app/**/*.cpp
            app/**/*.c
            app/**/*.php
            app/**/*.rb
            app/**/*.go
            app/**/*.ts
      
      # - name: Send Telegram notification - Analysis Start
      #   env:
      #     TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      #     TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      #   run: |
      #     python scripts/ci_cd/send_telegram.py \
      #       --event analysis_start \
      #       --pr-number ${{ github.event.pull_request.number }} \
      #       --repo ${{ github.repository }}
      
      - name: Analyze changed files with ML
        id: analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARGS="--files \"${{ steps.changed-files.outputs.all_changed_files }}\" --repo-owner ${{ github.repository_owner }} --repo-name ${{ github.event.repository.name }} --threshold 0.75"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            ARGS="$ARGS --pr-number ${{ github.event.pull_request.number }}"
          fi
          python scripts/ci_cd/analyze_pr.py $ARGS
      
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let commentBody = '';
            
            try {
              commentBody = fs.readFileSync('reports/pr_comment.md', 'utf8');
            } catch (e) {
              commentBody = '## 🔒 Análisis de Seguridad\n\nNo se pudo generar el reporte de análisis.';
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            });
      
      # - name: Handle vulnerable code
      #   if: github.event_name == 'pull_request' && steps.analysis.outcome == 'failure'
      #   env:
      #     TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      #     TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #   run: |
