      #       --event vulnerability_rejected \
      #       --pr-number ${{ github.event.pull_request.number }} \
      #       --repo ${{ github.repository }}
          
      #     # Agregar etiqueta fixing-required
      #     python scripts/ci_cd/comment_pr.py \
      #       --repo-owner ${{ github.repository_owner }} \
      #       --repo-name ${{ github.event.repository.name }} \
      #       --pr-number ${{ github.event.pull_request.number }} \
      #       --label fixing-required
          
      #     # Crear issue automática
      #     python scripts/ci_cd/create_issue.py \
      #       --repo-owner ${{ github.repository_owner }} \
      #       --repo-name ${{ github.event.repository.name }} \
      #       --pr-number ${{ github.event.pull_request.number }} \
      #       --files "${{ steps.changed-files.outputs.all_changed_files }}"
          
      #     exit 1
      
      # # - name: Send Telegram notification - Analysis Result (Safe)
      # #   if: steps.analysis.outcome == 'success'
      # #   env:
      # #     TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      # #     TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
