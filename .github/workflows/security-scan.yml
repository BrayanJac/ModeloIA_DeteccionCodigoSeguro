name: Security Vulnerability Scan

on:
  pull_request:
    branches:
      - test
    types: [opened, synchronize, reopened]

jobs:
  security-scan:
    name: Analyze Code for Vulnerabilities
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scikit-learn joblib numpy
      
      - name: Download trained model
        run: |
          # Descargar el modelo entrenado desde releases o artifacts
          # Por ahora, asumimos que el modelo está en el repositorio
          echo "Modelo debe estar en models/ directory"
          ls -la models/ || echo "Directorio models no encontrado"
      
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            **/*.py
            **/*.js
            **/*.java
            **/*.cpp
            **/*.c
            **/*.csharp
            **/*.php
            **/*.rb
            **/*.go
            **/*.swift
            **/*.kt
            **/*.ts
      
      - name: Check if model exists
        run: |
          if [ ! -f "models/security_classifier.joblib" ]; then
            echo "ERROR: Modelo no encontrado. Ejecuta primero el entrenamiento."
            echo "El modelo debe estar en models/security_classifier.joblib"
            exit 1
          fi
          if [ ! -f "models/vectorizer.joblib" ]; then
            echo "ERROR: Vectorizador no encontrado."
            exit 1
          fi
          if [ ! -f "models/feature_names.joblib" ]; then
            echo "ERROR: Nombres de características no encontrados."
            exit 1
          fi
          echo "Modelo y vectorizador encontrados exitosamente"
      
      - name: Analyze changed files
        id: analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/ci_cd/analyze_pr.py \
            --files "${{ steps.changed-files.outputs.all_changed_files }}" \
            --pr-number ${{ github.event.pull_request.number }} \
            --repo-owner ${{ github.repository_owner }} \
            --repo-name ${{ github.event.repository.name }} \
            --threshold 0.7
      
      - name: Comment on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let commentBody = '';
            
            try {
              commentBody = fs.readFileSync('reports/pr_comment.md', 'utf8');
            } catch (e) {
              commentBody = '## Análisis de Seguridad\n\nNo se pudo generar el reporte de análisis.';
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            });
      
      - name: Fail if vulnerable code detected
        if: steps.analysis.outcome == 'failure'
        run: |
          echo "Se detectó código vulnerable en el PR."
          echo "Por favor revisa los comentarios en el PR para más detalles."
          exit 1
      
      - name: Success message
        if: steps.analysis.outcome == 'success'
        run: |
          echo "✓ No se detectó código vulnerable."
          echo "El código pasó el análisis de seguridad."
