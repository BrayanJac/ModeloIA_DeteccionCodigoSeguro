      #       node scripts/ci_cd/send_telegram.js \
      #         --event test_result \
      #         --repo ${{ github.repository }} \
      #         --status failure \
      #         --message "Las pruebas unitarias han fallado"
      #     else
      #       node scripts/ci_cd/send_telegram.js \
      #         --event test_result \
      #         --repo ${{ github.repository }} \
      #         --status success \
      #         --message "Pruebas unitarias exitosas"
      #     fi

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: |
          cd app
          npm ci

      - name: Run integration tests
        id: integration-tests
        run: |
          cd app
          npm test

