name: Testing

on:
  push:
    branches:
      - test

permissions:
  contents: write
  issues: write
  pull-requests: write
  checks: write

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && contains(github.event.head_commit.message, 'Merge pull request'))

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: |
          cd app
          npm ci

      - name: Run unit tests
        id: unit-tests
        run: |
          cd app
          npm run test:unit

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && contains(github.event.head_commit.message, 'Merge pull request'))

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: |
          cd app
          npm ci

      - name: Run integration tests
        id: integration-tests
        run: |
          cd app
          npm run test:integration

  notify-tests:
    name: Notify Test Result
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install notification dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Send Telegram notification - Test Result
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ "${{ needs.unit-tests.result }}" = "success" ] && [ "${{ needs.integration-tests.result }}" = "success" ]; then
            python scripts/ci_cd/send_telegram.py \
              --event test_result \
              --repo ${{ github.repository }} \
              --status success \
              --details "Pruebas unitarias e integración exitosas"
          else
            python scripts/ci_cd/send_telegram.py \
              --event test_result \
              --repo ${{ github.repository }} \
              --status failure \
              --details "Unit Tests: ${{ needs.unit-tests.result }} | Integration Tests: ${{ needs.integration-tests.result }}"
          fi

      - name: Resolve related PR
        id: related-pr
        if: needs.unit-tests.result != 'success' || needs.integration-tests.result != 'success'
        uses: actions/github-script@v7
        with:
          script: |
            if (context.payload.pull_request) {
              core.setOutput('number', String(context.payload.pull_request.number));
              return;
            }

            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha
            });

            const related = prs.data.find((pr) => pr.base.ref === 'test' || pr.base.ref === 'main') || prs.data[0];
            core.setOutput('number', related ? String(related.number) : '');

      - name: Mark PR as tests failed
        if: steps.related-pr.outputs.number != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p reports
          cat > reports/test_failure_comment.md <<'EOF'
          ## 🧪 Resultado de pruebas: fallido

          Las pruebas del pipeline no pasaron.

          - Unit Tests: ${{ needs.unit-tests.result }}
          - Integration Tests: ${{ needs.integration-tests.result }}

          El merge a main queda bloqueado hasta corregir los errores.
          EOF

          python scripts/ci_cd/comment_pr.py \
            --repo-owner ${{ github.repository_owner }} \
            --repo-name ${{ github.event.repository.name }} \
            --pr-number ${{ steps.related-pr.outputs.number }} \
            --comment-file reports/test_failure_comment.md \
            --label tests-failed

      - name: Fail notification job when tests failed
        if: needs.unit-tests.result != 'success' || needs.integration-tests.result != 'success'
        run: |
          echo "Las pruebas fallaron. Se bloquea el avance a main."
          exit 1

  merge-to-main:
    name: Merge to Main Branch
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, notify-tests]
    if: success() && github.event_name == 'push' && github.ref_name == 'test' && contains(github.event.head_commit.message, 'Merge pull request')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Validate promotion source
        run: |
          if [ "${{ github.event_name }}" != "push" ]; then
            echo "Este workflow solo puede promover pushes validados desde test hacia main."
            exit 1
          fi

          if [ "${{ github.ref_name }}" != "test" ]; then
            echo "Solo se permite promover cambios desde test hacia main."
            exit 1
          fi

      - name: Create PR to main
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          # Verificar si ya existe un PR de test a main
          EXISTING_PR=$(gh pr list --base main --head test --json number --jq '.[0].number' || echo "")

          if [ -n "$EXISTING_PR" ]; then
            echo "Ya existe un PR de test a main (#$EXISTING_PR). Actualizando..."
            gh pr edit "$EXISTING_PR" --title "Automated promotion from test to main" --body "Este PR fue creado automáticamente por el workflow de pruebas después de pasar todas las pruebas."
          else
            echo "Creando nuevo PR de test a main..."
            gh pr create \
              --base main \
              --head test \
              --title "Automated promotion from test to main" \
              --body "Este PR fue creado automáticamente por el workflow de pruebas después de pasar todas las pruebas."

            # Obtener el número del PR recién creado
            PR_NUMBER=$(gh pr list --base main --head test --json number --jq '.[0].number')

            # Hacer merge del PR automáticamente sin aprobación previa
            gh pr merge "$PR_NUMBER" --merge --delete-branch=false --admin
          fi
          
      - name: Send Telegram notification - Merge to Main
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/ci_cd/send_telegram.py \
            --event merge_main \
            --repo ${{ github.repository }}
