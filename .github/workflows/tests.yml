name: Testing

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest flask
          cd app
          pip install -r requirements.txt
      
      - name: Run unit tests
        id: unit-tests
        run: |
          cd app
          python -m pytest tests/ -v --tb=short
      
      # - name: Send Telegram notification - Test Result
