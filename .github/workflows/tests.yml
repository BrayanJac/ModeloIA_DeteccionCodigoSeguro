      #       --pr-number ${{ github.event.pull_request.number }} \
      #       --label tests-failed
          
      #     exit 1

  merge-to-main:
    name: Auto-merge to Main Branch
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Auto-merge to main
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ github.event.pull_request.base.ref }}" = "main" ]; then
            # Merge del PR a main usando GitHub CLI
            gh pr merge ${{ github.event.pull_request.number }} --merge --repo ${{ github.repository }}
          else
            # Crear PR automático de test a main
            gh pr create --base main --head test --title "Auto-PR: Merge test to main" --body "Automated PR created from push to test branch after tests passed" --repo ${{ github.repository }}
          fi
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}

