name: Testing

on:
  push:
    branches:
      - test
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: |
          cd app
          npm ci

      - name: Run unit tests
        id: unit-tests
        run: |
          cd app
          npm test

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: |
          cd app
          npm ci

      - name: Run integration tests
        id: integration-tests
        run: |
          cd app
          npm test

  notify-tests:
    name: Notify Test Result
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install notification dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Send Telegram notification - Test Result
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ "${{ needs.unit-tests.result }}" = "success" ] && [ "${{ needs.integration-tests.result }}" = "success" ]; then
            python scripts/ci_cd/send_telegram.py \
              --event test_result \
              --repo ${{ github.repository }} \
              --status success \
              --details "Pruebas unitarias e integración exitosas"
          else
            python scripts/ci_cd/send_telegram.py \
              --event test_result \
              --repo ${{ github.repository }} \
              --status failure \
              --details "Unit Tests: ${{ needs.unit-tests.result }} | Integration Tests: ${{ needs.integration-tests.result }}"
          fi

      - name: Resolve related PR
        id: related-pr
        if: needs.unit-tests.result != 'success' || needs.integration-tests.result != 'success'
        uses: actions/github-script@v7
        with:
          script: |
            if (context.payload.pull_request) {
              core.setOutput('number', String(context.payload.pull_request.number));
              return;
            }

            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha
            });

            const related = prs.data.find((pr) => pr.base.ref === 'test' || pr.base.ref === 'main') || prs.data[0];
            core.setOutput('number', related ? String(related.number) : '');

      - name: Mark PR as tests failed
        if: steps.related-pr.outputs.number != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p reports
          cat > reports/test_failure_comment.md <<'EOF'
          ## 🧪 Resultado de pruebas: fallido

          Las pruebas del pipeline no pasaron.

          - Unit Tests: ${{ needs.unit-tests.result }}
          - Integration Tests: ${{ needs.integration-tests.result }}

          El merge a main queda bloqueado hasta corregir los errores.
          EOF

          python scripts/ci_cd/comment_pr.py \
            --repo-owner ${{ github.repository_owner }} \
            --repo-name ${{ github.event.repository.name }} \
            --pr-number ${{ steps.related-pr.outputs.number }} \
            --comment-file reports/test_failure_comment.md \
            --label tests-failed

      - name: Fail notification job when tests failed
        if: needs.unit-tests.result != 'success' || needs.integration-tests.result != 'success'
        run: |
          echo "Las pruebas fallaron. Se bloquea el avance a main."
          exit 1

  merge-to-main:
    name: Merge to Main Branch
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, notify-tests]
    if: success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Merge to main
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main

          git merge ${{ github.sha }} --no-ff

          git push origin main

      - name: Send Telegram notification - Merge to Main
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/ci_cd/send_telegram.py \
            --event merge_main \
            --repo ${{ github.repository }}
